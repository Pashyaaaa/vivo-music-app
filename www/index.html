<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Melodrome Native Premium</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #121212;
        color: #fff;
        margin: 0;
        padding: 20px 20px 120px 20px;
        -webkit-user-select: none;
        user-select: none;
      }
      .app-container {
        max-width: 600px;
        margin: 0 auto;
        position: relative;
      }

      /* List Lagu dengan Space untuk Index A-Z */
      .list-wrapper {
        display: flex;
        position: relative;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        width: calc(100% - 35px);
        max-height: calc(100vh - 220px);
        overflow-y: auto;
        scroll-behavior: smooth;
      }
      li {
        background: #1e1e1e;
        padding: 14px;
        margin-bottom: 8px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #282828;
      }
      li.playing {
        border-color: #1db954;
        background: #1c2820;
      }
      li span {
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        width: 75%;
      }

      /* Panel A-Z di Pinggir */
      .az-index {
        position: fixed;
        right: 10px;
        top: 80px;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        background: rgba(24, 24, 24, 0.8);
        border-radius: 20px;
        padding: 8px 4px;
        gap: 2px;
        z-index: 10;
        max-height: calc(100vh - 240px);
        overflow-y: auto;
      }
      .az-letter {
        color: #b3b3b3;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }
      .az-letter:hover {
        background: #333;
        color: #1db954;
      }

      /* Fixed Bottom Now Playing Bar */
      .bottom-player {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #181818;
        border-top: 1px solid #282828;
        padding: 15px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 100;
        box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.5);
      }
      .player-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .track-metadata {
        width: 60%;
      }
      .track-title {
        margin: 0;
        font-size: 15px;
        font-weight: bold;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .track-time {
        font-size: 11px;
        color: #aaa;
        margin-top: 2px;
      }

      /* Player Controls */
      .player-buttons {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .btn-control {
        background: none;
        border: none;
        color: #fff;
        font-size: 20px;
        cursor: pointer;
        transition: transform 0.1s;
        padding: 5px;
      }
      .btn-control:active {
        transform: scale(0.9);
      }
      .btn-play-toggle {
        font-size: 28px;
        color: #1db954;
      }

      /* Custom Seek Bar / Slider */
      .seek-container {
        display: flex;
        align-items: center;
        width: 100%;
        gap: 10px;
      }
      .slider-progress {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 5px;
        background: #404040;
        border-radius: 3px;
        outline: none;
        margin: 0;
      }
      .slider-progress::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #1db954;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h2 style="margin-top: 10px">🎵 Melodrome</h2>

      <div class="list-wrapper">
        <ul id="library-ul">
          <li style="color: #aaa">Mencari file musik...</li>
        </ul>

        <div class="az-index" id="az-index-div"></div>
      </div>
    </div>

    <audio id="audio-player"></audio>

    <div class="bottom-player">
      <div class="player-info">
        <div class="track-metadata">
          <p class="track-title" id="current-title">Tidak memutar lagu</p>
          <div class="track-time" id="track-time-display">00:00 / 00:00</div>
        </div>

        <div class="player-buttons">
          <button class="btn-control" onclick="playPrev()">⏮️</button>
          <button
            class="btn-control btn-play-toggle"
            id="btn-play-id"
            onclick="togglePlay()"
          >
            ▶️
          </button>
          <button class="btn-control" onclick="playNext()">⏭️</button>
        </div>
      </div>

      <div class="seek-container">
        <input
          type="range"
          class="slider-progress"
          id="seek-slider"
          value="0"
          min="0"
          max="100"
          oninput="seekingAudio()"
          onchange="seekAudioFinal()"
        />
      </div>
    </div>

    <script src="cordova.js"></script>
    <script>
      const libraryUl = document.getElementById("library-ul");
      const audioPlayer = document.getElementById("audio-player");
      const currentTitle = document.getElementById("current-title");
      const btnPlay = document.getElementById("btn-play-id");
      const seekSlider = document.getElementById("seek-slider");
      const timeDisplay = document.getElementById("track-time-display");
      const azIndexDiv = document.getElementById("az-index-div");

      let songEntries = [];
      let currentIndex = -1;
      let isUserSeeking = false;

      document.addEventListener(
        "deviceready",
        () => {
          scanMusicFolder();

          // Poin 2: Auto-refresh saat user kembali membuka aplikasi setelah mendownload file baru
          document.addEventListener(
            "resume",
            () => {
              scanMusicFolder();
            },
            false,
          );
        },
        false,
      );

      function scanMusicFolder() {
        if (typeof cordova === "undefined") return;

        window.resolveLocalFileSystemURL(
          cordova.file.externalRootDirectory + "Music/",
          (dirEntry) => {
            let directoryReader = dirEntry.createReader();
            directoryReader.readEntries(
              (entries) => {
                let files = entries.filter(
                  (e) => e.isFile && e.name.endsWith(".mp3"),
                );

                // Poin 1: Urutkan daftar lagu secara Ascending (A-Z)
                files.sort((a, b) => a.name.localeCompare(b.name));

                songEntries = files;
                renderLibrary();
                buildAZIndex();
              },
              (err) => console.error(err),
            );
          },
          (err) => {
            libraryUl.innerHTML = '<li>Folder "Music" tidak ditemukan.</li>';
          },
        );
      }

      function renderLibrary() {
        libraryUl.innerHTML = "";
        if (songEntries.length === 0) {
          libraryUl.innerHTML =
            '<li style="color:#aaa;">Tidak ada file MP3.</li>';
          return;
        }
        songEntries.forEach((entry, index) => {
          const firstLetter = entry.name.charAt(0).toUpperCase();
          const li = document.createElement("li");
          li.setAttribute("id", `song-index-${index}`);
          // Tandai elemen pertama yang mengawali huruf tersebut untuk lompatan index A-Z
          li.setAttribute("data-letter", firstLetter);

          if (index === currentIndex) li.className = "playing";

          li.innerHTML = `
                    <span>${entry.name.replace(".mp3", "")}</span>
                    <button onclick="playSong(${index})">▶️</button>
                `;
          libraryUl.appendChild(li);
        });
      }

      // Poin 1: Membuat tombol navigasi huruf A-Z di sisi kanan
      function buildAZIndex() {
        azIndexDiv.innerHTML = "";
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        letters.forEach((letter) => {
          const div = document.createElement("div");
          div.className = "az-letter";
          div.innerText = letter;
          div.onclick = () => scrollToLetter(letter);
          azIndexDiv.appendChild(div);
        });
      }

      function scrollToLetter(letter) {
        // Cari lagu pertama yang judulnya berawalan huruf tersebut
        const targetIndex = songEntries.findIndex((e) =>
          e.name.toUpperCase().startsWith(letter),
        );
        if (targetIndex !== -1) {
          const targetEl = document.getElementById(`song-index-${targetIndex}`);
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        }
      }

      function playSong(index) {
        if (index < 0 || index >= songEntries.length) return;

        // Hapus style active lama
        if (currentIndex !== -1) {
          const oldEl = document.getElementById(`song-index-${currentIndex}`);
          if (oldEl) oldEl.className = "";
        }

        currentIndex = index;
        const entry = songEntries[currentIndex];

        // Highlight lagu aktif
        const currentEl = document.getElementById(`song-index-${currentIndex}`);
        if (currentEl) currentEl.className = "playing";

        audioPlayer.src = entry.toInternalURL();
        currentTitle.innerText = entry.name.replace(".mp3", "");

        audioPlayer.play();
        btnPlay.innerText = "⏸️";

        // Kirim data ke sistem native jika plugin lock screen aktif (Poin 3)
        updateNativeMediaControls(entry.name.replace(".mp3", ""));
      }

      function togglePlay() {
        if (currentIndex === -1 && songEntries.length > 0) {
          playSong(0);
          return;
        }
        if (audioPlayer.paused) {
          audioPlayer.play();
          btnPlay.innerText = "⏸️";
        } else {
          audioPlayer.pause();
          btnPlay.innerText = "▶️";
        }
      }

      function playNext() {
        if (songEntries.length === 0) return;
        let next = currentIndex + 1;
        if (next >= songEntries.length) next = 0; // Loop kembali ke atas
        playSong(next);
      }

      function playPrev() {
        if (songEntries.length === 0) return;
        let prev = currentIndex - 1;
        if (prev < 0) prev = songEntries.length - 1; // Lompat ke lagu paling bawah
        playSong(prev);
      }

      // Poin 6: Logika Custom Slider & Sinkronisasi Waktu Putar (Bebas Bug Mengambang)
      audioPlayer.addEventListener("timeupdate", () => {
        if (isUserSeeking || isNaN(audioPlayer.duration)) return;

        const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        seekSlider.value = progress;

        formatTimeDisplay(audioPlayer.currentTime, audioPlayer.duration);
      });

      audioPlayer.addEventListener("ended", () => {
        playNext();
      });

      function seekingAudio() {
        isUserSeeking = true;
      }

      function seekAudioFinal() {
        if (isNaN(audioPlayer.duration)) return;
        const newTime = (seekSlider.value / 100) * audioPlayer.duration;
        audioPlayer.currentTime = newTime;
        isUserSeeking = false;
      }

      function formatTimeDisplay(current, duration) {
        timeDisplay.innerText = `${cleanTime(current)} / ${cleanTime(duration)}`;
      }

      function cleanTime(seconds) {
        if (isNaN(seconds)) return "00:00";
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
      }

      // Fungsi cadangan interaksi untuk sistem native lockscreen (Poin 3)
      function updateNativeMediaControls(title) {
        if (typeof MusicControls !== "undefined") {
          MusicControls.create({
            track: title,
            artist: "Melodrome",
            isPlaying: true,
            dismissable: false,
            hasPrev: true,
            hasNext: true,
            hasClose: false,
          });

          MusicControls.subscribe((action) => {
            const message = JSON.parse(action).message;
            switch (message) {
              case "music-controls-next":
                playNext();
                break;
              case "music-controls-previous":
                playPrev();
                break;
              case "music-controls-pause":
                togglePlay();
                MusicControls.updateIsPlaying(false);
                break;
              case "music-controls-play":
                togglePlay();
                MusicControls.updateIsPlaying(true);
                break;
              default:
                break;
            }
          });
          MusicControls.listen();
        }
      }
    </script>
  </body>
</html>
