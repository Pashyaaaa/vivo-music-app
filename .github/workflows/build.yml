name: Build Melodrome APK

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Kode dari Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Setup Mesin Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Rakit APK via Cordova CLI
        run: |
          npm install -g cordova
          cordova create cordova-app com.pashya.melodrome Melodrome
          rm -rf cordova-app/www/*
          cp -r www/* cordova-app/www/
          # Memasukkan surat izin khusus
          cp config.xml cordova-app/config.xml
          cd cordova-app
          cordova platform add android
          cordova plugin add cordova-plugin-file
          # Menambah plugin pop-up izin
          cordova plugin add cordova-plugin-android-permissions
          cordova build android

      - name: Sediakan Tombol Download APK
        uses: actions/upload-artifact@v4
        with:
          name: Melodrome-Release-APK
          path: cordova-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
